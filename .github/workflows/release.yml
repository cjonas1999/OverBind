name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.5.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  version-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists
        id: tag_check
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v6
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        if: steps.tag_check.outputs.exists == 'false'

      - name: Bump versions
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" src-tauri/Cargo.toml
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" pkg/GIT/PKGBUILD
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" pkg/STABLE/PKGBUILD

      - name: Update Cargo.lock
        if: steps.tag_check.outputs.exists == 'false'
        run: cargo fetch --manifest-path src-tauri/Cargo.toml

      - name: Commit, tag, and push
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock pkg/GIT/PKGBUILD pkg/STABLE/PKGBUILD
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin HEAD:master --tags

  build-linux:
    needs: version-and-tag
    if: ${{ !failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.sha }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libinput-dev \
            libudev-dev

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build cursor overlay
        run: |
          TARGET=$(rustc -vV | sed -n 's/host: //p')
          mkdir -p src-tauri/target/release
          touch "src-tauri/target/release/cursor-overlay-$TARGET"
          cargo build --release --bin "cursor-overlay-$TARGET" --manifest-path src-tauri/Cargo.toml

      - name: Build Linux bundles
        run: npm run tauri build -- --bundles deb,appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - uses: actions/upload-artifact@v6
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - uses: actions/upload-artifact@v6
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-arch:
    needs: version-and-tag
    if: ${{ !failure() }}
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Bootstrap keyring and git
        run: |
          pacman -Syu --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed git

      - name: Create build user
        run: useradd -m builder

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.sha }}

      - uses: actions/cache@v4
        with:
          path: |
            pkg/GIT/cargo-home
            pkg/GIT/cargo-target
            /var/cache/pacman/pkg
          key: arch-${{ hashFiles('src-tauri/Cargo.lock', 'pkg/GIT/PKGBUILD') }}
          restore-keys: arch-

      - name: Install build dependencies
        run: |
          pacman -S --noconfirm --needed \
            base-devel wget zsync \
            cargo cargo-tauri npm \
            gtk3 libayatana-appindicator webkit2gtk-4.1

      - name: Fix permissions
        run: chown -R builder:builder .

      - name: Build package with makepkg
        run: |
          runuser -u builder -- bash <<'EOF'
          set -e
          cd pkg/GIT
          makepkg --noconfirm
          cp *.pkg.tar.zst ../AppImage/
          cd ../AppImage/
          tar -xvf $(ls *.pkg.tar.zst | grep -v debug)
          EOF

      - name: Build AppImage
        run: |
          cd pkg/AppImage
          chmod +x AppImage.sh
          ./AppImage.sh

      - uses: actions/upload-artifact@v6
        with:
          name: arch-appimage
          path: pkg/AppImage/dist/*.AppImage

  build-windows:
    needs: version-and-tag
    if: ${{ !failure() }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build Windows bundles
        run: npm run tauri build -- --bundles msi --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - uses: actions/upload-artifact@v6
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: [build-linux, build-arch, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          draft: true
          files: |
            artifacts/linux-deb/*.deb
            artifacts/linux-appimage/*.AppImage
            artifacts/arch-appimage/*.AppImage
            artifacts/windows-msi/*.msi
