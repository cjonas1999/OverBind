name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.5.3 or 1.5.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      should_release: ${{ steps.extract.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Determine version to build
        id: extract
        env:
          MSG: ${{ github.event.head_commit.message }}
          INPUT: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # workflow_dispatch: use explicit input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${INPUT#v}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # commit message starts with a version: start a fresh release
          if [[ "$MSG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+) ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # no version in message: check if the latest tag has been shipped yet
          LATEST_TAG=$(git tag --sort=-version:refname | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          IS_DRAFT=$(gh release view "$LATEST_TAG" --json isDraft --jq '.isDraft' 2>/dev/null || echo "none")
          if [ "$IS_DRAFT" = "false" ]; then
            # published release — nothing pending
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            # draft or no release yet — still pending, keep building
            echo "version=${LATEST_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  version-and-tag:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if tag already exists
        id: tag_check
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          if git ls-remote --tags origin "refs/tags/v$VERSION" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.tag_check.outputs.exists == 'false'
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable
        if: steps.tag_check.outputs.exists == 'false'

      - name: Bump versions
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json src-tauri/tauri.conf.json
          sed -i "0,/^version = \".*\"/{s/^version = \".*\"/version = \"$VERSION\"/}" src-tauri/Cargo.toml

      - name: Update Cargo.lock
        if: steps.tag_check.outputs.exists == 'false'
        run: cargo fetch --manifest-path src-tauri/Cargo.toml

      - name: Commit, tag, and push
        if: steps.tag_check.outputs.exists == 'false'
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock
          git commit -m "chore: release v$VERSION [skip ci]"
          git tag "v$VERSION"
          git push origin HEAD:master --tags

      - name: Move tag to latest commit
        if: steps.tag_check.outputs.exists == 'true'
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git tag -f "v$VERSION"
          git push origin --force "refs/tags/v$VERSION"

  build-linux:
    needs: [check, version-and-tag]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check.outputs.version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libinput-dev \
            libudev-dev

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build cursor overlay
        run: cargo build --release --bin cursor-overlay-x86_64-unknown-linux-gnu --manifest-path src-tauri/Cargo.toml

      - name: Build Linux bundles
        run: npm run tauri build -- --bundles deb,appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

  build-windows:
    needs: [check, version-and-tag]
    if: needs.check.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.check.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - run: npm ci

      - name: Build Windows bundles
        run: npm run tauri build -- --bundles msi --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    needs: [check, build-linux, build-windows]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          draft: true
          files: |
            artifacts/linux-deb/*.deb
            artifacts/linux-appimage/*.AppImage
            artifacts/windows-msi/*.msi
